<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATV Remote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0c0e;
    --surface:   #141418;
    --surface2:  #1c1c22;
    --border:    #2a2a35;
    --accent:    #6c63ff;
    --accent2:   #ff6584;
    --text:      #e8e8f0;
    --muted:     #5a5a72;
    --glow:      rgba(108,99,255,0.35);
    --btn-bg:    #1e1e28;
    --btn-hover: #26263a;
    --btn-active:#2e2e45;
    --radius:    14px;
    --radius-sm: 9px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    gap: 20px;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  * { position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 99px;
    transition: all 0.3s;
  }
  .status-pill.connected { color: #6ee7b7; border-color: #6ee7b733; }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-pill.connected .status-dot {
    background: #6ee7b7;
    box-shadow: 0 0 8px #6ee7b7aa;
  }

  /* ── Connect card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 420px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .connect-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-connect {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-connect:hover { background: #7b74ff; }
  .btn-connect:active { transform: scale(0.96); }

  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ── Remote body ── */
  .remote {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 4px;
    margin-top: 4px;
  }

  /* ── Button grid base ── */
  .btn-grid {
    display: grid;
    gap: 8px;
  }

  /* ── Generic remote button ── */
  .rbtn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 14px 8px;
    transition: background 0.12s, transform 0.08s, box-shadow 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .rbtn:hover { background: var(--btn-hover); }
  .rbtn:active {
    background: var(--btn-active);
    transform: scale(0.93);
    box-shadow: 0 0 18px var(--glow);
  }
  .rbtn svg { opacity: 0.85; }
  .rbtn .label {
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  /* Accent buttons */
  .rbtn.accent {
    border-color: var(--accent);
    color: var(--accent);
  }
  .rbtn.accent:hover { background: #1a1a2e; }
  .rbtn.accent-red { border-color: var(--accent2); color: var(--accent2); }
  .rbtn.accent-red:hover { background: #1e1418; }

  /* ── Power row ── */
  .power-row {
    grid-template-columns: 1fr 1fr 1fr;
  }

  /* ── D-pad ── */
  .dpad-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 8px;
    aspect-ratio: 1;
    max-width: 260px;
    margin: 0 auto;
    width: 100%;
  }
  .dpad-empty { background: transparent; border: none; cursor: default; }
  .dpad-empty:hover { background: transparent; }
  .dpad-empty:active { transform: none; box-shadow: none; }

  .rbtn.center-btn {
    border-radius: 50%;
    aspect-ratio: 1;
    background: var(--accent);
    border-color: transparent;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 0 24px var(--glow);
  }
  .rbtn.center-btn:hover { background: #7b74ff; box-shadow: 0 0 32px var(--glow); }
  .rbtn.center-btn:active { transform: scale(0.9); }

  /* ── Nav row (Back / Home / Menu) ── */
  .nav-row { grid-template-columns: 1fr 1fr 1fr; }

  /* ── Volume row ── */
  .vol-row { grid-template-columns: 1fr auto 1fr; align-items: center; }
  .vol-sep {
    width: 1px;
    height: 32px;
    background: var(--border);
    margin: 0 4px;
  }

  /* ── Media row ── */
  .media-row { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }

  /* ── App launcher ── */
  .apps-grid {
    grid-template-columns: repeat(3, 1fr);
  }
  .app-btn {
    aspect-ratio: 1.3;
    flex-direction: column;
    gap: 6px;
  }
  .app-name {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Keyboard ── */
  .kbd-row {
    display: flex;
    gap: 8px;
  }
  .kbd-row input {
    flex: 1;
    font-size: 14px;
  }
  .btn-send {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-send:hover { background: var(--btn-hover); }
  .btn-send:active { transform: scale(0.95); }

  /* disabled state */
  .remote { opacity: 0.4; pointer-events: none; transition: opacity 0.4s; }
  .remote.active { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<header>
  <div class="logo">ATV<span>·</span>Remote</div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">disconnected</span>
  </div>
</header>

<!-- Connect -->
<div class="card">
  <div class="card-title">Connect to TV</div>
  <div class="connect-row">
    <input type="text" id="tvIp" placeholder="192.168.1.x" value="">
    <button class="btn-connect" id="connectBtn" onclick="connect()">Connect</button>
  </div>
  <div class="error-msg" id="errMsg"></div>
</div>

<!-- Remote -->
<div class="remote" id="remote">

  <!-- Power / System -->
  <div class="section-label">System</div>
  <div class="btn-grid power-row">
    <button class="rbtn accent-red" onclick="key('power')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
      <span class="label">Power</span>
    </button>
    <button class="rbtn" onclick="key('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="label">Home</span>
    </button>
    <button class="rbtn" onclick="key('back')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="label">Back</span>
    </button>
  </div>

  <!-- D-pad -->
  <div class="section-label">Navigate</div>
  <div class="dpad-wrap">
    <button class="rbtn dpad-empty"></button>
    <button class="rbtn" onclick="key('up')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button class="rbtn dpad-empty"></button>

    <button class="rbtn" onclick="key('left')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="rbtn center-btn" onclick="key('center')">OK</button>
    <button class="rbtn" onclick="key('right')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <button class="rbtn dpad-empty"></button>
    <button class="rbtn" onclick="key('down')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="rbtn dpad-empty"></button>
  </div>

  <!-- Volume -->
  <div class="section-label">Volume</div>
  <div class="btn-grid vol-row">
    <button class="rbtn" onclick="key('vol_down')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      <span class="label">Vol −</span>
    </button>
    <div class="vol-sep"></div>
    <button class="rbtn" onclick="key('vol_up')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <span class="label">Vol +</span>
    </button>
  </div>

  <!-- Media playback -->
  <div class="section-label">Media</div>
  <div class="btn-grid media-row">
    <button class="rbtn" onclick="key('prev')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      <span class="label">Prev</span>
    </button>
    <button class="rbtn" onclick="key('rewind')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
      <span class="label">Rew</span>
    </button>
    <button class="rbtn accent" onclick="key('play_pause')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <span class="label" style="color:var(--accent)">Play</span>
    </button>
    <button class="rbtn" onclick="key('fast_fwd')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
      <span class="label">FFwd</span>
    </button>
    <button class="rbtn" onclick="key('next')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      <span class="label">Next</span>
    </button>
  </div>

  <!-- Apps -->
  <div class="section-label">Apps</div>
  <div class="btn-grid apps-grid">
    <button class="rbtn app-btn" onclick="launchApp('netflix')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#e50914"><path d="M5 2v20l7-3.5 7 3.5V2z"/></svg>
      <span class="app-name">Netflix</span>
    </button>
    <button class="rbtn app-btn" onclick="launchApp('youtube')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#FF0000"><path d="M23 7s-.3-2-1.2-2.7c-1.1-1.2-2.4-1.2-3-1.3C16.6 3 12 3 12 3s-4.6 0-6.8.1C4.6 4.2 3.3 4.2 2.2 5.3 1.3 6 1 8 1 8S.7 10.2.7 12.4v2.1C.7 16.7 1 18.8 1 18.8s.3 2 1.2 2.7c1.1 1.2 2.6 1.1 3.3 1.2C7.6 22.9 12 23 12 23s4.6 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.7 1.2-2.7 1.2-2.7s.3-2.1.3-4.3v-2.1C23.3 10.2 23 8 23 8zM9.7 15.5V8.4l6.5 3.6-6.5 3.5z"/></svg>
      <span class="app-name">YouTube</span>
    </button>
    <button class="rbtn app-btn" onclick="launchApp('prime')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#00A8E1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      <span class="app-name">Prime</span>
    </button>
    <button class="rbtn app-btn" onclick="launchApp('disney')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#1a3bc1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm4 12H8v-1c0-2.67 5.33-4 8-4s8 1.33 8 4v1z"/></svg>
      <span class="app-name">Disney+</span>
    </button>
    <button class="rbtn app-btn" onclick="launchApp('spotify')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 14.36c-.18.29-.56.39-.85.2-2.34-1.43-5.28-1.75-8.74-.96-.33.08-.66-.13-.74-.46-.08-.33.13-.66.46-.74 3.79-.87 7.04-.5 9.67 1.11.29.18.39.57.2.85zm1.24-2.76c-.23.37-.71.48-1.08.25-2.68-1.65-6.76-2.13-9.93-1.16-.41.12-.84-.11-.96-.52-.12-.41.11-.84.52-.96 3.62-1.1 8.12-.57 11.2 1.32.36.23.48.71.25 1.07zm.11-2.87C14.9 8.9 9.82 8.73 6.5 9.72c-.49.15-1.01-.13-1.16-.62-.15-.49.13-1.01.62-1.16 3.83-1.16 9.41-.93 13.12 1.35.44.26.58.83.32 1.27-.26.44-.83.59-1.41.13z"/></svg>
      <span class="app-name">Spotify</span>
    </button>
    <button class="rbtn app-btn" onclick="launchApp('settings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="app-name">Settings</span>
    </button>
  </div>

  <!-- Text input -->
  <div class="section-label">Keyboard</div>
  <div class="card" style="padding:14px">
    <div class="kbd-row">
      <input type="text" id="textInput" placeholder="Type to send text…">
      <button class="btn-send" onclick="sendText()">Send</button>
    </div>
  </div>

</div><!-- /remote -->

<div id="toast"></div>

<script>
  const API = '';  // same origin

  // ── State ──
  let connected = false;

  // ── DOM refs ──
  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const errMsg     = document.getElementById('errMsg');
  const remoteEl   = document.getElementById('remote');
  const toast      = document.getElementById('toast');

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ── Connect ──
  async function connect() {
    const ip = document.getElementById('tvIp').value.trim();
    if (!ip) { showError('Enter TV IP address'); return; }

    errMsg.classList.remove('show');
    const btn = document.getElementById('connectBtn');
    btn.textContent = '…';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/api/connect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ host: ip })
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Failed');
      setConnected(true, data.device);
    } catch (err) {
      showError(err.message);
      setConnected(false);
    } finally {
      btn.textContent = 'Connect';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    errMsg.textContent = msg;
    errMsg.classList.add('show');
  }

  function setConnected(yes, device) {
    connected = yes;
    statusPill.classList.toggle('connected', yes);
    statusText.textContent = yes ? (device || 'connected') : 'disconnected';
    remoteEl.classList.toggle('active', yes);
  }

  // ── Key ──
  async function key(k) {
    if (!connected) return;
    try {
      const res = await fetch(`${API}/api/key`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: k })
      });
      const data = await res.json();
      if (!res.ok) showToast('⚠ ' + data.error);
    } catch (err) {
      showToast('⚠ ' + err.message);
    }
  }

  // ── App launch ──
  async function launchApp(appKey) {
    if (!connected) return;
    showToast('Launching ' + appKey + '…');
    try {
      const res = await fetch(`${API}/api/app`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ app: appKey })
      });
      const data = await res.json();
      if (!res.ok) showToast('⚠ ' + data.error);
    } catch (err) {
      showToast('⚠ ' + err.message);
    }
  }

  // ── Text input ──
  async function sendText() {
    const txt = document.getElementById('textInput').value;
    if (!txt || !connected) return;
    // ADB shell input text — escape spaces
    const escaped = txt.replace(/ /g, '%s');
    try {
      await fetch(`${API}/api/shell`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd: `input text "${escaped}"` })
      });
      document.getElementById('textInput').value = '';
      showToast('Text sent');
    } catch (err) {
      showToast('⚠ ' + err.message);
    }
  }

  // Enter key for text input
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendText();
  });

  // Enter on IP field to connect
  document.getElementById('tvIp').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    const map = {
      'ArrowUp':    'up',    'ArrowDown':  'down',
      'ArrowLeft':  'left',  'ArrowRight': 'right',
      'Enter':      'center','Backspace':  'back',
      ' ':          'play_pause',
      '+':          'vol_up', '-': 'vol_down',
    };
    if (map[e.key]) { e.preventDefault(); key(map[e.key]); }
  });

  // ── Check status on load ──
  (async () => {
    try {
      const res = await fetch(`${API}/api/status`);
      const data = await res.json();
      if (data.connected) setConnected(true, data.device);
    } catch {}
  })();
</script>
</body>
</html>
